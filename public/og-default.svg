<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#33415A" stroke-width="0.75" opacity="0.3"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0.35" stop-color="#14243A"/>
      <stop offset="1" stop-color="#14243A" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- Canvas -->
  <rect width="1200" height="630" fill="#14243A"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Secure-core network motif, right side -->
  <g stroke="#33415A" stroke-width="1.5" opacity="0.7">
    <line x1="780" y1="170" x2="940" y2="250"/>
    <line x1="940" y1="250" x2="1080" y2="160"/>
    <line x1="940" y1="250" x2="900" y2="430"/>
    <line x1="940" y1="250" x2="1060" y2="400"/>
    <line x1="900" y1="430" x2="1060" y2="400"/>
  </g>
  <g>
    <circle cx="780" cy="170" r="6" fill="#4F5D75"/>
    <circle cx="1080" cy="160" r="6" fill="#4F5D75"/>
    <circle cx="900" cy="430" r="6" fill="#4F5D75"/>
    <circle cx="1060" cy="400" r="6" fill="#4F5D75"/>
    <circle cx="940" cy="250" r="9" fill="#2563EB"/>
  </g>
  <rect width="1200" height="630" fill="url(#fade)"/>

  <!-- Mark - bowline knot-B (viewBox 0..40 scaled 1.5 into a 60px box) -->
  <g transform="translate(90, 88) scale(1.5)">
    <path d="M11 5 V35" fill="none" stroke="#E2E8F0" stroke-width="3.1" stroke-linecap="round"/>
    <path d="M11 5 H21 a7 7 0 0 1 1.1 13.9" fill="none" stroke="#E2E8F0" stroke-width="3.1" stroke-linecap="round"/>
    <path d="M19 19.5 H11" fill="none" stroke="#E2E8F0" stroke-width="3.1" stroke-linecap="round"/>
    <path d="M11 20.5 H23 a7.3 7.3 0 0 1 0 14.5 H11" fill="none" stroke="#E2E8F0" stroke-width="3.1" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M22.2 18.4 C18 21 18 19.8 14 22.4" fill="none" stroke="#2563EB" stroke-width="3.1" stroke-linecap="round"/>
  </g>
  <text x="172" y="130" font-family="'Sora', Arial, sans-serif" font-size="30" font-weight="600" fill="#E2E8F0" letter-spacing="-0.5">Bowline Federal Technologies</text>

  <!-- Eyebrow -->
  <text x="90" y="300" font-family="'IBM Plex Mono', monospace" font-size="20" letter-spacing="3" fill="#3B82F6">SDVOSB · 8(a)-TRACK · FEDERAL IT</text>

  <!-- Legal name -->
  <text x="88" y="372" font-family="'Sora', Arial, sans-serif" font-size="62" font-weight="700" fill="#F4F7FB" letter-spacing="-1.5">Bowline Federal</text>
  <text x="88" y="442" font-family="'Sora', Arial, sans-serif" font-size="62" font-weight="700" fill="#F4F7FB" letter-spacing="-1.5">Technologies</text>

  <!-- Tagline -->
  <text x="90" y="512" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="28" fill="#8C9BB3">Mission-critical technology. Engineered with precision.</text>

  <!-- Accent rule -->
  <rect x="90" y="540" width="120" height="4" fill="#2563EB"/>
</svg>
